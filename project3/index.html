<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square's Journey</title>
    <link rel="stylesheet" href="styles.css"> </head>
<body class="cute-theme">
    
    <div id="start-screen" class="screen active">
        <h1>Square's Journey</h1>
        <p>Guide the little block to the green safe zone!</p>
        <button id="start-btn">Start Journey</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-header">
            <div id="level-indicator">Level: <span id="level-text">1</span></div>
            <div id="game-over-message">GAME OVER</div>
        </div>
        <div id="game-container">
            <div id="blood-overlay"></div>
            <div id="player"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
